<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" >
	<title>Login SIte</title>
</head>
<style>
	body {
		background: white;
		color: black;
		font-family: sans-serif;
		font-size: medium;
		font-weight: bolder;
		font-style: initial;
		padding: 0;
		margin: 0;
		max-width: 1920px;
		width: 100%;
		max-height: 1080px;
		height: 100vh;
	}
	
	.container-login {
		background: gray;
		padding: 192px;
		margin: 108px;
		border: 1px solid dimgray;
	}
	
	.container-login:focus {
		border: 1px solid blue;
	}
	
	input {
		background: ghostwhite;
		color: black;
		padding: 18px;
		margin: 9px;
		border: 1px solid dimgray;
		opacity: 1;
	}
	
	input:focus {
		background: black;
		color: ghostwhite;
		border: 1px solid blue;
		opacity: 0.9;
	}
	
	button {
		background: blue;
		color: white;
		padding: 14px;
		margin: 7px;
		border: 1px solid dimgray;
		opacity: 1;
	}
	
	button:focus {
		background: white;
		color: black;
		border: 1px solid blue;
		opacity: 0.9;
	}
	
	button:hover {
		opacity: 0.7;
		transform: translateY(4px);
	}
	
	button:active {
		opacity: 0.3;
		transform: translateX(5px);
	}
	
	a {
		padding: 10px;
		margin: 5px;
		color: whitesmoke;
	}
</style>
<body>
	<div class="container-login">
		<input id="write_username" type="text" />
		<input id="Write_password" type="password" />
		<button id="button_login" type="button">Login</button>
		<a href="sign.html">Sing up</a>
	</div>
	
</body>
<script>
	const a = document.getElementById("write_username");
	const b = document.getElementById("Write_password");
	const btn = document.getElementById("button_login");
	
	btn.addEventListener("click", function () {
		if (a.value == "" || b.value == "") {
			window.alert("ERROR!: Write username or password ");
		} else {
			window.location.href("main.html");
		}
	});
	
	document.getElementById("keydown", function () {
		if (event.key == "enter") {
			window.location.href("main.html");
		}
	});
</script>
</html>
