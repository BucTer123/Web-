<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clicker</title>
</head>
<style>
    body {
        background: white;
        color: black;
        font-family: sans-serif;
        font-size: medium;
        font-style: initial;
        font-weight: bolder;
        padding: 0;
        margin: 0;
        max-width: 1920px;
        width: 100%;
        max-height: 1080px;
        height: 100vh;
    }
</style>
<body>
    <div class="check">
        11^2 = ?
        <input id="inpute" type="text" />
        <button id="btn" type="button">Send</button>
    </div>
</body>
<script>
    const inp = document.getElementById("inpute");
    const btn = document.getElementById("btn");

    btn.addEventListener("click", function () {
        if (inp.value == "121") {
            window.location.href = "clicker.html";
        } else {
            window.alert("ERROR!");
        }
    });

    document.addEventListener("keydown", function () {
        if (event.key == "enter") {
            if (inp.value == "121") {
                window.location.href = "clicker.html";
            } else {
                window.alert("ERROR!");
            }
        }
    });
</script>
</html>
