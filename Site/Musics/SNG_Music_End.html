    body {
        background: whitesmoke;
        color: black;
        font-family: sans-serif;
        font-size: medium;
        font-weight: bolder;
        font-style: initial;
        display: flex;
        padding: 0;
        margin: 0;
        max-width: 1080px;
        width: 100%;
        max-height: 1920px;
        height: 100%;
    }
    video {
        background: dimgray;
        color: whitesmoke;
        padding: 20px;
        margin: 10px;
        border: 1px solid black;
        opacity: 1;
    }
    video:focus {
        border: 1px solid dimgray;
        opacity: 0.7;
        background: whitesmoke;
        color: dimgray;
    }
    video:hover {
        opacity: 0.5;
        transform: translateY(10px);
    }
    video:active {
        opacity: 0.3;
        transform: scale(3.3);
    }
</style>
