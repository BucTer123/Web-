<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Music</title>
</head>
<style>
    body {
        background: whitesmoke;
        color: black;
        font-family: sans-serif;
        font-size: medium;
        font-weight: bolder;
        font-style: initial;
        display: flex;
        padding: 0;
        margin: 0;
        max-width: 1080px;
        width: 100%;
        max-height: 1920px;
        height: 100%;
    }
    audio {
        background: dimgray;
        color: whitesmoke;
        padding: 20px;
        margin: 10px;
        border: 1px solid black;
        opacity: 1;
    }
    audio:focus {
        border: 1px solid dimgray;
        opacity: 0.7;
        background: whitesmoke;
        color: dimgray;
    }
    audio:hover {
        opacity: 0.5;
        transform: translateY(10px);
    }
    audio:active {
        opacity: 0.3;
        transform: scale(3.3);
    }
</style>
<body>
    <input id="go" type="file" />
    <br><br>

    <audio id="pl"  accept="audio/*"></audio>
</body>
<script>
    const start = document.getElementById("pl");
    const go = document.getElementById("go");

    go.addEventListener("change", function () {
        const file = this.files[0];
        if (file) {
            const urel = URL.createObjectURL(file);
            start.src = urel;
            start.play();
        }
    });
</script>
</html>
