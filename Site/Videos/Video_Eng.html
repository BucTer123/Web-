<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video English</title>
</head>
<style>
    body {
        background: whitesmoke;
        color: black;
        font-family: sans-serif;
        font-size: medium;
        font-weight: bolder;
        font-style: initial;
        display: flex;
        padding: 0;
        margin: 0;
        max-width: 1080px;
        width: 100%;
        max-height: 1920px;
        height: 100%;
    }
    video {
        background: dimgray;
        color: whitesmoke;
        padding: 20px;
        margin: 10px;
        border: 1px solid black;
        opacity: 1;
    }
    video:focus {
        border: 1px solid dimgray;
        opacity: 0.7;
        background: whitesmoke;
        color: dimgray;
    }
    video:hover {
        opacity: 0.5;
        transform: translateY(10px);
    }
    video:active {
        opacity: 0.3;
        transform: scale(3.3);
    }
</style>
<body>
    <input id="go" type="file" />
    <br><br>

    <video id="op" accept="video/*" src="video_eng.mp4"></video>
</body>
<script>
    const pl = document.getElementById("op");
    const fo = document.getElementById("go");

fo.addEventListener("change", function () {
    const file = this.files[0];
    if (file) {
        const url = URL.createObjectURL(file);
        pl.src = url;
        pl.play(url);
    }
});
</script>
</html>
